# Quick-start: docker compose up
# Uses prebuilt Spree image — no local build needed.
# To customize the backend, run: docker compose -f docker-compose.dev.yml up
x-app: &app
  image: ghcr.io/spree/spree:${SPREE_VERSION_TAG:-latest}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    meilisearch:
      condition: service_healthy
  env_file: .env
  environment: &app-env
    DATABASE_URL: postgres://postgres@postgres:5432/spree_production
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    RAILS_FORCE_SSL: "false"
    RAILS_ASSUME_SSL: "false"
    MEILISEARCH_URL: http://meilisearch:7700

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: curl -f http://localhost:7700/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    <<: *app
    ports:
      - "${SPREE_PORT:-3000}:3000"
    volumes:
      - storage_data:/rails/storage
    healthcheck:
      test: curl -f http://localhost:3000/up || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *app
    command: bundle exec sidekiq
    environment:
      <<: *app-env
      RAILS_MAX_THREADS: ${SIDEKIQ_DB_POOL:-27}
    volumes:
      - storage_data:/rails/storage

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  storage_data:
